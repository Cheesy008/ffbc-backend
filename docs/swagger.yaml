      operationId: getInputCharacteristicTemplates
      parameters:
        - name: search
          in: query
          description: Value used to filter records.
          required: false
          schema:
            type: string
        - name: inputCharacteristics
          in: query
          description: Input characteristic identifiers used to filter records.
          required: false
          schema:
            type: array
            items:
              type: string
        - name: offset
          in: query
          description: Number of records to skip before returning results.
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: count
          in: query
          description: Maximum number of records to return.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: Field used to sort records.
          required: false
          schema:
            type: string
            enum:
              - name
            default: name
        - name: sortOrder
          in: query
          description: Sort direction.
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
