openapi: 3.1.0
info:
  title: FFBC Admin Panel API
  description: |-
    API for the FFBC Admin Panel service. It supports CRUD operations for platform entities.

    - [FFBC Documentation](https://github.com/cbrgpl/ffbc/tree/main/docs)
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: FFBC Documentation
  url: https://github.com/cbrgpl/ffbc/tree/main/docs
servers:
  - url: https://virtserver.swaggerhub.com/cybirgplorganization/ffbc-admin-panel/1.0.0
    description: SwaggerHub API Auto Mocking
tags:
  - name: auth
    description: Authentication operations
  - name: input-characteristic
    description: Input characteristic operations
  - name: service-category
    description: Service category operations
  - name: service-modifier
    description: Service modifier operations
  - name: service
    description: Service operations
  - name: s3
    description: S3 compatible file operations
paths:
  /auth/login-with-credentials:
    post:
      tags:
        - auth
      summary: Login with credentials.
      operationId: loginWithCredentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginWithCredentialsRequestDto'
      responses:
        '200':
          description: Logged in. Authentication tokens are stored in cookies.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/logout:
    post:
      tags:
        - auth
      summary: Logout current user.
      operationId: logout
      responses:
        '204':
          description: Logged out.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - ffbc_admin_auth:
            - admin
  /input-characteristic:
    get:
      tags:
        - input-characteristic
      summary: Get input characteristics list.
      operationId: getInputCharacteristics
      parameters:
        - name: search
          in: query
          description: Value used to filter records.
          required: false
          schema:
            type: string
        - name: offset
          in: query
          description: Number of records to skip before returning results.
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: count
          in: query
          description: Maximum number of records to return.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Input characteristics list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InputCharacteristicDto'
        '204':
          description: No input characteristics found.
        '400':
